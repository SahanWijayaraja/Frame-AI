workflows:
  android-debug:
    name: FrameAI Android Debug
    working_directory: frameai_app
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Setup Secrets Vault
        script: echo "GEMINI_API_KEY=${GEMINI_API_KEY:-PLACE_KEY_IN_CODEMAGIC_DASHBOARD}" > .env
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
