workflows:
  flutter-android:
    name: FrameAI Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - common
      vars:
        PACKAGE_NAME: "com.sahan.frameai_app"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Setup DotEnv Vault
        script: |
          # The real .env is secret/gitignored, so we inject a placeholder 
          # on the cloud server just to satisfy the Flutter asset bundler compliler.
          # To use the real key in CI builds, you add it to Codemagic environment variables:
          echo "GEMINI_API_KEY=${GEMINI_API_KEY:-PLACE_YOUR_KEY_IN_CODEMAGIC_SECRETS}" > .env
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - $USER_EMAIL # Will use the email of the person who triggered the build
        notify:
          success: true
          failure: true
