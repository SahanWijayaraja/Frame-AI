name: frameai_app
description: FrameAI - Real-Time AI Composition Coach
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.0
  image: ^4.1.3
  camera: ^0.10.5+9
  permission_handler: ^11.1.0
  gal: ^2.3.0
  cupertino_icons: ^1.0.2
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.0
  google_generative_ai: ^0.4.6
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/models/deeplabv3.tflite
    - assets/models/midas_small.tflite
    - assets/models/nima_mobilenet.tflite
    - assets/logo.png
